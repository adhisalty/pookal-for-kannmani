<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>pookal for my kannmani</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(#07142a,#0f172a,#08122a);
font-family:sans-serif;
overflow:hidden;
color:white;
text-align:center;
}

.garden{
position:relative;
}

h1{
font-size:48px;
opacity:0;
animation:fadeIn 2s forwards;
}

.instructions{
opacity:0;
font-size:20px;
margin-top:10px;
animation:fadeIn 2s forwards;
animation-delay:2s;
}

.flowers{
margin-top:30px;
}

.flower{
font-size:70px;
margin:10px;
cursor:pointer;
display:inline-block;
transform:translateY(120px) scale(0);
animation:grow 1s forwards;
}

.flower:nth-child(1){animation-delay:1s;}
.flower:nth-child(2){animation-delay:1.3s;}
.flower:nth-child(3){animation-delay:1.6s;}
.flower:nth-child(4){animation-delay:1.9s;}
.flower:nth-child(5){animation-delay:2.2s;}
.flower:nth-child(6){animation-delay:2.5s;}

.flower:hover{
transform:scale(1.3) rotate(10deg);
}

#message{
opacity:0;
margin-top:30px;
font-size:26px;
line-height:1.7;
transition:opacity 2s;
}

.petal{
position:absolute;
top:-50px;
font-size:24px;
animation:fall linear infinite;
}

.sparkle{
position:absolute;
font-size:20px;
animation:spark 1s ease-out forwards;
}

@keyframes grow{
0%{transform:translateY(120px) scale(0);}
100%{transform:translateY(0) scale(1);}
}

@keyframes fadeIn{
to{opacity:1;}
}

@keyframes fall{
0%{transform:translateY(-50px) rotate(0deg);}
100%{transform:translateY(110vh) rotate(360deg);}
}

@keyframes spark{
0%{opacity:1; transform:scale(.5);}
100%{opacity:0; transform:scale(2);}
}

</style>
</head>

<body>

<div class="garden">

<h1>Hello Kannmani 🌸</h1>

<div class="instructions">
ella poovilum njekk 🌷
</div>

<div class="flowers">

<span class="flower" onclick="bloom(this)">🌸</span>
<span class="flower" onclick="bloom(this)">🌼</span>
<span class="flower" onclick="bloom(this)">🌷</span>
<span class="flower" onclick="bloom(this)">🌹</span>
<span class="flower" onclick="bloom(this)">🌺</span>
<span class="flower" onclick="bloom(this)">🌻</span>

</div>

<div id="message">
adjust with these pookal for now 🌸<br><br>
your viva will go great ✨<br><br>
btw congrats on getting your periods 🌷
</div>

</div>

<script>

let count=0;
const total=6;

function bloom(flower){

flower.style.transform="scale(1.6) rotate(20deg)";
flower.style.filter="drop-shadow(0 0 12px pink)";
flower.innerHTML="💮";

count++;

sparkle(flower);

if(count>=total){
document.getElementById("message").style.opacity=1;
}

}

function sparkle(el){
for(let i=0;i<6;i++){
let s=document.createElement("div");
s.className="sparkle";
s.innerHTML="✨";
s.style.left=(el.offsetLeft+Math.random()*60-20)+"px";
s.style.top=(el.offsetTop+Math.random()*60-20)+"px";
document.body.appendChild(s);
setTimeout(()=>s.remove(),1000);
}
}

function createPetal(){
let p=document.createElement("div");
p.className="petal";
p.innerHTML=["🌸","🌺","🌼"][Math.floor(Math.random()*3)];
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(p);

setTimeout(()=>p.remove(),10000);
}

setInterval(createPetal,400);

</script>

</body>
</html>
